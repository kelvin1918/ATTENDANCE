<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Portal</title>
    <style>
        :root { --red: #d32f2f; --bg: #f4f7f6; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin:0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
        }
        
        /* Custom Popup/Toast Style */
        #custom-alert {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: 0.5s ease-in-out;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #custom-alert.show { top: 30px; }
        #custom-alert.error { border-left: 5px solid #ff5252; }
        #custom-alert.success { border-left: 5px solid #4caf50; }

        /* Modal Style */
        .modal-card { 
            background: white; 
            padding: 45px; 
            border-radius: 24px; 
            width: 380px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            text-align: center;
            position: relative;
        }

        .logo { 
            color: var(--red); 
            font-weight: 800; 
            font-size: 2rem; 
            margin-bottom: 5px; 
            letter-spacing: 1px;
        }

        h2 { 
            margin-bottom: 30px; 
            color: #333; 
            font-weight: 600;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            background: #f9f9f9;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--red);
            background: white;
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.05);
        }

        .btn-red { 
            width: 100%; 
            padding: 14px; 
            background: var(--red); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 20px; 
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-red:hover {
            background: #b71c1c;
            transform: translateY(-2px);
        }

        .btn-link { 
            width: 100%; 
            background: none; 
            border: none; 
            color: #888; 
            margin-top: 20px; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 0.85rem; 
        }

        .hidden { display: none !important; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="custom-alert">
        <span id="alert-msg"></span>
    </div>

    <div id="login-modal" class="modal-card fade-in">
        <div class="logo">LOG IN</div>
        <h2>Instructor</h2>
        <input type="email" id="ins-email" placeholder="Email Address">
        <input type="password" id="ins-pass" placeholder="Password">
        <button class="btn-red" onclick="handleLogin()">Sign In</button>
        <button class="btn-link" onclick="toggleView('reg')">Don't have an account? <b>Register</b></button>
    </div>

    <div id="reg-modal" class="modal-card fade-in hidden">
        <div class="logo">REGISTER</div>
        <h2>New Instructor</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 15px;">Admin approval required.</p>
        <input type="email" id="reg-email" placeholder="Email Address">
        <input type="password" id="reg-pass" placeholder="Password">
        <button class="btn-red" onclick="handleRegister()">Create Account</button>
        <button class="btn-link" onclick="toggleView('login')">Already have an account? <b>Login</b></button>
    </div>

    <script>
        // Custom Alert Function
        function showAlert(msg, type = 'success') {
            const alertBox = document.getElementById('custom-alert');
            const alertMsg = document.getElementById('alert-msg');
            
            alertMsg.innerText = msg;
            alertBox.className = ''; 
            alertBox.classList.add('show');
            alertBox.classList.add(type);

            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3000);
        }

        // Enter Key Support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('login-modal').classList.contains('hidden')) handleLogin();
                else handleRegister();
            }
        });

        function toggleView(view) {
            document.getElementById('login-modal').classList.toggle('hidden', view === 'reg');
            document.getElementById('reg-modal').classList.toggle('hidden', view === 'login');
        }

        async function handleRegister() {
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value.trim();
            if(!e || !p) return showAlert("Fill up mo lahat beshy!", "error");
            if(!e.includes('@')) return showAlert("Invalid email format!", "error");
            try {
                const res  = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: e, password: p })
                });
                const data = await res.json();
                if(!res.ok) return showAlert(data.error || "Registration failed.", "error");
                showAlert("Success! Wait for Admin approval.", "success");
                setTimeout(() => toggleView('login'), 2000);
            } catch { showAlert("Server error.", "error"); }
        }

        async function handleLogin() {
            const e = document.getElementById('ins-email').value;
            const p = document.getElementById('ins-pass').value;
            try {
                const res  = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: e, password: p })
                });
                const data = await res.json();
                if(res.status === 403) return showAlert("Your account is still pending approval.", "error");
                if(!res.ok)           return showAlert(data.error || "Invalid email or password.", "error");
                localStorage.setItem('active_session', JSON.stringify({ email: data.email }));
                showAlert("Login Success! Redirecting...", "success");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } catch { showAlert("Server error.", "error"); }
        }
    </script>
</body>
</html>
